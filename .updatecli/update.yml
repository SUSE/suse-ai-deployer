sources:
  # Get the chart version of the sub-charts published in application-collection
  # chart version
  milvus-chart-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/milvus | yq -r '.version'
  ollama-chart-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/ollama | yq -r '.version'
  open-webui-chart-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/open-webui | yq -r '.version'
  pytorch-chart-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/pytorch | yq -r '.version'
  vllm-chart-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/vllm | yq -r '.version'
  open-webui-mcpo-chart-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/open-webui-mcpo | yq -r '.version'

  # Get the app version of the sub-charts published in application-collection
  # app version
  milvus-app-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/milvus | yq -r '.appVersion'
  ollama-app-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/ollama | yq -r '.appVersion'
  open-webui-app-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/open-webui | yq -r '.appVersion'
  pytorch-app-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/pytorch | yq -r '.appVersion'
  vllm-app-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/vllm | yq -r '.appVersion'
  open-webui-mcpo-app-version:
    kind: shell
    spec:
      command: |
        helm show chart oci://dp.apps.rancher.io/charts/open-webui-mcpo | yq -r '.appVersion'

  # Get the image tag with revision
  milvus-image-tag-rev:
    kind: shell
    spec:
      command: |
        helm show values oci://dp.apps.rancher.io/charts/milvus | yq -r '.image.all.tag'
  ollama-image-tag-rev:
    kind: shell
    spec:
      command: |
        helm show values oci://dp.apps.rancher.io/charts/ollama | yq -r '.image.tag'
  open-webui-image-tag-rev:
    kind: shell
    spec:
      command: |
        helm show values oci://dp.apps.rancher.io/charts/open-webui | yq -r '.image.tag'
  pytorch-image-tag-rev:
    kind: shell
    spec:
      command: |
        helm show values oci://dp.apps.rancher.io/charts/pytorch | yq -r '.image.tag'
  vllm-openai-image-tag-rev:
    kind: shell
    spec:
      command: |
        vllmopenai_appversion=$(helm show chart oci://dp.apps.rancher.io/charts/vllm | yq -r '.appVersion')
        crane ls dp.apps.rancher.io/containers/vllm-openai | grep "$vllmopenai_appversion" | sort -V | tail -n 1

  open-webui-mcpo-image-tag-rev:
    kind: shell
    spec:
      command: |
        helm show values oci://dp.apps.rancher.io/charts/open-webui-mcpo | yq -r '.image.tag'

targets:
  # Ensure the index of the key corresponds to the order of dependencies in Chart.yaml
  update-chart-milvus:
    kind: yaml
    sourceid: milvus-chart-version
    spec:
      file: ./Chart.yaml
      key: $.dependencies[0].version
  update-chart-ollama:
    kind: yaml
    sourceid: ollama-chart-version
    spec:
      file: ./Chart.yaml
      key: $.dependencies[1].version
  update-chart-open-webui:
    kind: yaml
    sourceid: open-webui-chart-version
    spec:
      file: ./Chart.yaml
      key: $.dependencies[2].version
  update-chart-pytorch:
    kind: yaml
    sourceid: pytorch-chart-version
    spec:
      file: ./Chart.yaml
      key: $.dependencies[3].version
  update-chart-vllm:
    kind: yaml
    sourceid: vllm-chart-version
    spec:
      file: ./Chart.yaml
      key: $.dependencies[4].version
  update-chart-open-webui-mcpo:
    kind: yaml
    sourceid: open-webui-mcpo-chart-version
    spec:
      file: ./Chart.yaml
      key: $.dependencies[5].version

  update-image-annotation-milvus:
    sourceid: milvus-image-tag-rev
    kind: file
    spec:
      file: ./Chart.yaml
      matchpattern: "milvus:.*"
      replacepattern: 'milvus:{{ source "milvus-image-tag-rev" }}'

  update-image-annotation-ollama:
    sourceid: ollama-image-tag-rev
    kind: file
    spec:
      file: ./Chart.yaml
      matchpattern: "ollama:.*"
      replacepattern: 'ollama:{{ source "ollama-image-tag-rev" }}'

  update-image-annotation-open-webui:
    sourceid: open-webui-image-tag-rev
    kind: file
    spec:
      file: ./Chart.yaml
      matchpattern: "open-webui:.*"
      replacepattern: 'open-webui:{{ source "open-webui-image-tag-rev" }}'

  update-image-annotation-pytorch:
    sourceid: pytorch-image-tag-rev
    kind: file
    spec:
      file: ./Chart.yaml
      matchpattern: "pytorch:.*"
      replacepattern: 'pytorch:{{ source "pytorch-image-tag-rev" }}'

  update-image-annotation-vllm:
    sourceid: vllm-openai-image-tag-rev
    kind: file
    spec:
      file: ./Chart.yaml
      matchpattern: "vllm-openai:.*"
      replacepattern: 'vllm-openai:{{ source "vllm-openai-image-tag-rev" }}'

  update-image-annotation-open-webui-mcpo:
    sourceid: open-webui-mcpo-image-tag-rev
    kind: file
    spec:
      file: ./Chart.yaml
      matchpattern: "open-webui-mcpo:.*"
      replacepattern: 'open-webui-mcpo:{{ source "open-webui-mcpo-image-tag-rev" }}'